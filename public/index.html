<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Dept - Politeknik MBP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; overflow: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        /* PENGATURAN LATAR BELAKANG BARU */
        .chat-bg-image { 
            background-image: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), 
                              url('https://lh3.googleusercontent.com/u/0/d/1aRd54t2rE0civ4JD3LWn6WGp6J9OPj3z'); 
            background-size: cover; 
            background-position: center;
            background-attachment: fixed;
        }

        @media (max-width: 768px) {
            body { overflow: auto; }
            .main-container { flex-direction: column; height: auto; }
            .chat-area { height: 75vh !important; }
            .sidebar { display: none; }
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="glass p-4 flex justify-between items-center z-10">
        <div>
            <h1 class="text-blue-400 font-bold text-lg leading-none">ENGLISH DEPARTMENT <span class="text-yellow-400 text-sm">MBP</span></h1>
            <p class="text-[10px] text-slate-400 font-mono tracking-widest uppercase italic mt-1">Virtual Community Room</p>
        </div>
        <div class="flex items-center gap-2 bg-slate-800 px-3 py-1 rounded-full border border-green-500/30">
            <div id="status-dot" class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
            <span class="text-[10px] font-bold text-green-400 uppercase">System Active</span>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden main-container">
        <aside class="sidebar w-1/4 glass overflow-y-auto p-6 hidden md:block">
            <div class="space-y-6 text-xs italic text-slate-300">
                <section>
                    <h2 class="text-blue-400 font-bold border-b border-blue-900 pb-2 mb-3 uppercase tracking-widest">A. Karir Lulusan</h2>
                    <p>• Translator • English Trainer • Marketing</p>
                </section>
                <section>
                    <h2 class="text-blue-400 font-bold border-b border-blue-900 pb-2 mb-3 uppercase tracking-widest">B. Beasiswa</h2>
                    <div class="bg-blue-600/20 p-3 rounded-xl border border-blue-500/30">
                        <p class="text-yellow-400 font-bold">KIP & YAYASAN</p>
                        <p class="text-white mt-2">Gelar: A.Md.Ling & S.Tr</p>
                    </div>
                </section>
            </div>
        </aside>

        <main class="chat-area flex-1 flex flex-col chat-bg-image relative">
            <div id="chat-window" class="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar">
                </div>

            <div class="p-4 bg-slate-900/95 backdrop-blur-md border-t border-white/10">
                <form id="chat-form" class="flex flex-col gap-2 max-w-4xl mx-auto">
                    <input type="text" id="user-name" placeholder="Nama Anda / Asal Sekolah..." 
                           class="bg-slate-800 border border-slate-700 text-xs rounded-lg px-3 py-2 text-white outline-none focus:border-blue-500">
                    <div class="flex gap-2">
                        <textarea id="chat-input" rows="1" placeholder="Ketik pesan..." 
                                  class="flex-1 bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-blue-500"></textarea>
                        <button type="submit" class="bg-blue-600 hover:bg-blue-500 text-white w-12 h-12 rounded-xl flex items-center justify-center shadow-lg">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script>
        const _supabase = supabase.createClient(
            'https://mmkgrhrqeomhtiyvqihd.supabase.co', 
            'sb_publishable_iflG-_KX03OTOmRBDUPvWQ_lZwSfwMC'
        );

        const chatWindow = document.getElementById('chat-window');
        const chatForm = document.getElementById('chat-form');
        const chatInput = document.getElementById('chat-input');
        const userNameInput = document.getElementById('user-name');

        function renderMsg(name, content, isSelf) {
            const align = isSelf ? 'justify-end' : 'justify-start';
            const color = isSelf ? 'bg-blue-600' : 'glass';
            const html = `
                <div class="flex ${align}">
                    <div class="${color} p-3 rounded-2xl max-w-[80%] shadow-lg border border-white/5">
                        <p class="text-sm">${content}</p>
                        <span class="text-[9px] opacity-50 block mt-1 uppercase font-mono">${name}</span>
                    </div>
                </div>`;
            chatWindow.insertAdjacentHTML('beforeend', html);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        async function init() {
            const { data } = await _supabase.from('messages').select('*').order('created_at', { ascending: true });
            if (data) {
                chatWindow.innerHTML = '';
                data.forEach(m => renderMsg(m.sender, m.content, m.sender === (userNameInput.value || "Visitor")));
            }

            _supabase.channel('room1').on('postgres_changes', 
                { event: 'INSERT', schema: 'public', table: 'messages' }, 
                payload => {
                    const isSelf = payload.new.sender === (userNameInput.value || "Visitor");
                    renderMsg(payload.new.sender, payload.new.content, isSelf);
                }
            ).subscribe();
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const msg = chatInput.value.trim();
            const sender = userNameInput.value.trim() || "Visitor";
            if (!msg) return;

            const { error } = await _supabase.from('messages').insert([{ sender, content: msg }]);
            if (!error) chatInput.value = "";
        });

            init();
    </script>
</body>
</html>
